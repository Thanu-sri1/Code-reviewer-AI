apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: code-raptor-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Thanu-sri1/Code-reviewer-AI.git
    targetRevision: main
    path: argocd/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
