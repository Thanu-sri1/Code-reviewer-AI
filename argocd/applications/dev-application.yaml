apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: code-raptor-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Thanu-sri1/Code-reviewer-AI.git
    targetRevision: test
    path: helm
    helm:
      releaseName: code-raptor-dev
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-codereviewer
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
