{{- range .Values.namespaces }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ $.Values.secretProviderClass.name }}
  namespace: {{ . }}
spec:
  provider: {{ $.Values.secretProviderClass.provider }}
  secretObjects:
  - secretName: {{ $.Values.secret.name }}
    type: Opaque
    data:
    - objectName: AZURE_OPENAI_API_KEY
      key: AZURE_OPENAI_API_KEY
    - objectName: DATABASE_URL
      key: DATABASE_URL
    - objectName: JWT_SECRET
      key: JWT_SECRET
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ $.Values.secretProviderClass.userAssignedIdentityID | quote }}
    keyvaultName: {{ $.Values.secretProviderClass.keyvaultName }}
    tenantId: {{ $.Values.secretProviderClass.tenantId }}
    objects: |
      array:
        - |
          objectName: AZUREOPENAIAPIKEY
          objectType: secret
          objectAlias: AZURE_OPENAI_API_KEY
        - |
          objectName: DATABASEURL
          objectType: secret
          objectAlias: DATABASE_URL
        - |
          objectName: JWT
          objectType: secret
          objectAlias: JWT_SECRET
{{- end }}
