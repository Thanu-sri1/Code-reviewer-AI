namespaces:
  - codereviewer
  - codereviewer-secondary

replicaCount: 2

image:
  registry: thanusriacr.azurecr.io
  tag: v2
  pullPolicy: Always

configMap:
  name: coderaptor-config
  data:
    AZURE_OPENAI_ENDPOINT: "https://ai-codereviewer-resource.openai.azure.com/"
    AZURE_OPENAI_DEPLOYMENT: "gpt-4.1-mini"
    AZURE_OPENAI_API_VERSION: "2025-01-01-preview"
    AUTH_SERVICE_URL: "http://auth-service:8001"
    EXECUTION_SERVICE_URL: "http://execution-service:8002"
    AI_SERVICE_URL: "http://ai-service:8003"
    REVIEW_SERVICE_URL: "http://review-service:8004"

secret:
  name: kv-secret

secretProviderClass:
  name: kv-secrets
  provider: azure
  userAssignedIdentityID: "e9be58bc-a172-4aa0-8780-ca608a8e16f9"
  keyvaultName: kv-thanusri
  tenantId: cf4a245a-3bc5-4786-be95-383d6c394cf9

services:
  auth:
    name: auth-service
    image: auth-service
    port: 8001
  execution:
    name: execution-service
    image: execution-service
    port: 8002
  ai:
    name: ai-service
    image: ai-service
    port: 8003
  review:
    name: review-service
    image: review-service
    port: 8004
  frontend:
    name: frontend
    serviceName: frontend-service
    image: frontend
    port: 8501

keyvaultSync:
  enabled: true
  name: keyvault-secret-sync
  image: busybox:1.36
  replicaCount: 2

ingress:
  enabled: true
  namespace: codereviewer
  name: codereviewer-ingress
  className: azure-application-gateway
  annotations:
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/health-probe-path: "/_stcore/health"
    appgw.ingress.kubernetes.io/health-probe-port: "8501"
    appgw.ingress.kubernetes.io/health-probe-status-codes: "200-399"
    appgw.ingress.kubernetes.io/request-timeout: "60"
