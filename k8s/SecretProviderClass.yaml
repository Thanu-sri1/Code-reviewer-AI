apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: kv-secrets
  namespace: codereviewer
spec:
  provider: azure

  parameters:
    keyvaultName: kv-codereview
    tenantId: 1721d0c3-fba6-4501-83b6-4afe93a160bb

    objects: |
      array:
        - |
          objectName: AZURE_OPENAI_API_KEY
          objectType: secret
        - |
          objectName: DATABASE_URL
          objectType: secret
         - |
          objectName: JWT_SECRET
          objectType: secret
        