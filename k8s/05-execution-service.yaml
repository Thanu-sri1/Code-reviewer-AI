apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution-service
  namespace: codereviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: execution-service
  template:
    metadata:
      labels:
        app: execution-service
    spec:
      containers:
      - name: execution-service
        image: thanusriacr.azurecr.io/execution-service:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: coderaptor-config
        - secretRef:
            name: kv-secret
            optional: true
        ports:
        - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: execution-service
  namespace: codereviewer
spec:
  selector:
    app: execution-service
  ports:
  - port: 8002
    targetPort: 8002
  type: ClusterIP
