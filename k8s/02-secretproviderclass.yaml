apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: coderaptor-keyvault
  namespace: codereviewer
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "<USER_ASSIGNED_MANAGED_IDENTITY_CLIENT_ID>"
    keyvaultName: "<AZURE_KEY_VAULT_NAME>"
    tenantId: "<AZURE_TENANT_ID>"
    objects: |
      array:
        - |
          objectName: azure-openai-endpoint
          objectType: secret
          objectAlias: AZURE_OPENAI_ENDPOINT
        - |
          objectName: azure-openai-api-key
          objectType: secret
          objectAlias: AZURE_OPENAI_API_KEY
        - |
          objectName: azure-openai-deployment
          objectType: secret
          objectAlias: AZURE_OPENAI_DEPLOYMENT
        - |
          objectName: azure-openai-api-version
          objectType: secret
          objectAlias: AZURE_OPENAI_API_VERSION
        - |
          objectName: database-url
          objectType: secret
          objectAlias: DATABASE_URL
        - |
          objectName: postgres-password
          objectType: secret
          objectAlias: POSTGRES_PASSWORD
