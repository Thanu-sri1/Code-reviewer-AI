apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: codereviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: thanusriacr.azurecr.io/auth-service:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: coderaptor-config
        - secretRef:
            name: coderaptor-secret
        ports:
        - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: codereviewer
spec:
  selector:
    app: auth-service
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP