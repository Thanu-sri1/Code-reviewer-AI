apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: codereviewer

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-service

  template:
    metadata:
      labels:
        app: ai-service

    spec:
      containers:
      - name: ai-service
        image: thanusri22/ai-service:v2
        imagePullPolicy: Always

        envFrom:
        - configMapRef:
            name: coderaptor-config

        - secretRef:
            name: kv-secret
            optional: true

        env:
        - name: AZURE_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: kv-secret
              key: AZURE_OPENAI_API_KEY
              optional: true

        ports:
        - containerPort: 8003
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: codereviewer
spec:
  selector:
    app: ai-service
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP
