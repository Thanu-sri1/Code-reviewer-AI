apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: codereviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: thanusriacr.azurecr.io/ai-service:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: coderaptor-config
        - secretRef:
            name: coderaptor-secret
        ports:
        - containerPort: 8003
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: codereviewer
spec:
  selector:
    app: ai-service
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP