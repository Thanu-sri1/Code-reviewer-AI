apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: coderaptor
  labels:
    app: review-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      containers:
        - name: review-service
          image: <ACR_LOGIN_SERVER>/review-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: coderaptor-config
                  key: LOG_LEVEL
          readinessProbe:
            httpGet:
              path: /ready
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: 8004
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: coderaptor-keyvault
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: coderaptor
  labels:
    app: review-service
spec:
  type: ClusterIP
  selector:
    app: review-service
  ports:
    - name: http
      port: 8004
      targetPort: 8004
