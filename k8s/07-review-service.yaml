apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: codereviewer

spec:
  replicas: 1

  selector:
    matchLabels:
      app: review-service

  template:
    metadata:
      labels:
        app: review-service

    spec:
      containers:
      - name: review-service
        image: thanusriacr.azurecr.io/review-service:v1
        imagePullPolicy: Always

        envFrom:
        - configMapRef:
            name: coderaptor-config

        - secretRef:
            name: kv-secret

        ports:
        - containerPort: 8004

        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true

      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "kv-secrets"
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: codereviewer
spec:
  selector:
    app: review-service
  ports:
  - port: 8004
    targetPort: 8004
  type: ClusterIP
