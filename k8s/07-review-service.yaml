apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: codereviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      containers:
      - name: review-service
        image: thanusriacr.azurecr.io/review-service:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: coderaptor-config
        - secretRef:
            name: coderaptor-secret
            optional: true
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: coderaptor-config
              key: DATABASE_URL
        ports:
        - containerPort: 8004
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: codereviewer
spec:
  selector:
    app: review-service
  ports:
  - port: 8004
    targetPort: 8004
  type: ClusterIP
